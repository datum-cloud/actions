name: Nix Update VendorHash

on:
  workflow_call:
    inputs:
      go-version-file:
        description: Path to go.mod used by setup-go
        type: string
        default: go.mod
      task-command:
        description: Task command to run (must exist in the calling repo's Taskfile.yml)
        type: string
        default: nix-update-hash
      flake-path:
        description: Path to flake.nix to check for changes
        type: string
        default: flake.nix
      commit-message:
        description: Commit message for the vendorHash change
        type: string
        default: "chore(nix): update vendorHash for go deps"

permissions:
  contents: write

jobs:
  update-hash:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Install Task
        uses: arduino/setup-task@v3.0.0

      - name: Update nix vendor hash
        run: task ${{ inputs.task-command }}

      - name: Commit and push changes
        run: |
          git diff --exit-code ${{ inputs.flake-path }} && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ inputs.flake-path }}
          git commit -m "${{ inputs.commit-message }}"
          git push
