name: Enforce Single Assignee

on:
  workflow_call:
  issues:
    types: [assigned]

jobs:
  enforce:
    name: Enforce Single Assignee
    runs-on: ubuntu-latest
    concurrency:
      group: enforce-single-assignee-${{ github.event.issue.number }}
    permissions:
      issues: write
    steps:
      - name: Enforce single assignee
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          sleep 3

          ASSIGNEES=$(gh api "repos/$REPO/issues/$ISSUE_NUMBER" --jq '.assignees')
          COUNT=$(echo "$ASSIGNEES" | jq 'length')

          if [ "$COUNT" -le 1 ]; then
            echo "Issue has $COUNT assignee(s). No action needed."
            exit 0
          fi

          echo "Issue has $COUNT assignees. Removing all and posting comment."

          ALL_LOGINS=$(echo "$ASSIGNEES" | jq '[.[].login]')
          NAMES=$(echo "$ASSIGNEES" | jq -r '[.[].login] | map("@"+.) | join(", ")')

          gh api "repos/$REPO/issues/$ISSUE_NUMBER/assignees" \
            -X DELETE \
            --input - <<< "{\"assignees\": $ALL_LOGINS}"

          gh api "repos/$REPO/issues/$ISSUE_NUMBER/comments" \
            -X POST \
            --input - <<< "{\"body\": \"Issues must have exactly one assignee, but $COUNT were assigned ($NAMES). All assignees have been removed. Please assign a single owner.\"}"

          echo "Done. Removed all assignees and posted comment."
