name: Publish npm Package

on:
  workflow_call:
    inputs:
      package-name:
        required: true
        type: string
        description: "The npm package name (e.g. `@datum-cloud/datum-ui`)"
      package-path:
        required: true
        type: string
        description: "Path to the package directory relative to the repo root (e.g. `packages/datum-ui`)"
      node-version:
        required: false
        type: number
        description: "Node.js version to use"
        default: 24
      lockfile-path:
        required: false
        type: string
        description: >
          Path to pnpm-lock.yaml relative to the repo root.
          Defaults to "<package-path>/pnpm-lock.yaml".
          Set to "pnpm-lock.yaml" for monorepos with a root lockfile.
        default: ""
      install-path:
        required: false
        type: string
        description: >
          Working directory for pnpm install.
          Defaults to package-path.
          Set to "." for monorepos that install from the repo root.
        default: ""
      release-mode:
        required: false
        type: string
        description: >
          Publishing mode: "dev" publishes a pre-release version (x.y.z-dev.{sha})
          to the dev dist-tag. "release" publishes the version already present in
          package.json to the latest dist-tag. Version bumping, tagging, and git
          operations are the caller's responsibility. Defaults to "dev".
        default: dev
    outputs:
      new-version:
        description: "The version that was published (e.g. `v1.2.3` or `0.1.2-dev.abc1234`)"
        value: ${{ jobs.publish-release.outputs.new-version || jobs.publish-dev.outputs.new-version }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    # Skip the bot commit that callers create when bumping the version.
    # The committer name for GITHUB_TOKEN pushes is "github-actions[bot]".
    if: github.actor != 'github-actions[bot]'
    outputs:
      # For release mode, always publish (skip path filtering). Releases are
      # intentional and should not be gated on which files changed.
      package: ${{ inputs.release-mode == 'release' && 'true' || steps.filter.outputs.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check changed paths
        if: inputs.release-mode != 'release'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            package:
              - '${{ inputs.package-path }}/**'

  # ── Dev publish ─────────────────────────────────────────────────────────
  # Publishes a pre-release version (e.g. 0.1.2-dev.abc1234) to the "dev"
  # npm dist-tag on every push to main. No version bump commit or git tag.
  # Consumers install via: npm install <package>@dev
  publish-dev:
    name: Publish dev build
    needs: changes
    if: needs.changes.outputs.package == 'true' && inputs.release-mode == 'dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # needed for npm trusted publishing (OIDC)
    outputs:
      new-version: ${{ steps.version.outputs.new-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: ${{ inputs.package-path }}/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          cache-dependency-path: ${{ inputs.lockfile-path || format('{0}/pnpm-lock.yaml', inputs.package-path) }}
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: ${{ inputs.install-path || inputs.package-path }}
        run: pnpm install --frozen-lockfile

      - name: Compute dev version
        id: version
        working-directory: ${{ inputs.package-path }}
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DEV_VERSION="${BASE_VERSION}-dev.${SHORT_SHA}"
          echo "new-version=${DEV_VERSION}" >> "$GITHUB_OUTPUT"

          # Write the dev version into package.json (local only, not committed)
          npm version "${DEV_VERSION}" --no-git-tag-version

      - name: Build package
        working-directory: ${{ inputs.package-path }}
        run: pnpm run build

      - name: Publish to npm (dev)
        working-directory: ${{ inputs.package-path }}
        run: pnpm publish --no-git-checks --access public --provenance --tag dev

      - name: Summary
        run: |
          {
            echo "### Published dev build ${{ steps.version.outputs.new-version }}"
            echo ""
            echo "Package: \`${{ inputs.package-name }}\`"
            echo "Install: \`npm install ${{ inputs.package-name }}@dev\`"
            echo "Pin: \`npm install ${{ inputs.package-name }}@${{ steps.version.outputs.new-version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Release publish ──────────────────────────────────────────────────────
  # Publishes the version already present in package.json to the "latest"
  # npm dist-tag. The caller is responsible for bumping the version, creating
  # the git tag, and pushing before invoking this workflow. This job only
  # builds and publishes — it performs no git operations.
  publish-release:
    name: Publish release
    needs: changes
    if: needs.changes.outputs.package == 'true' && inputs.release-mode == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # needed for npm trusted publishing (OIDC)
    outputs:
      new-version: ${{ steps.version.outputs.new-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: ${{ inputs.package-path }}/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          cache-dependency-path: ${{ inputs.lockfile-path || format('{0}/pnpm-lock.yaml', inputs.package-path) }}
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: ${{ inputs.install-path || inputs.package-path }}
        run: pnpm install --frozen-lockfile

      - name: Read version from package.json
        id: version
        working-directory: ${{ inputs.package-path }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "new-version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build package
        working-directory: ${{ inputs.package-path }}
        run: pnpm run build

      - name: Publish to npm
        working-directory: ${{ inputs.package-path }}
        run: pnpm publish --no-git-checks --access public --provenance

      - name: Summary
        run: |
          {
            echo "### Published ${{ steps.version.outputs.new-version }}"
            echo ""
            echo "Package: \`${{ inputs.package-name }}\`"
            echo "Registry: https://www.npmjs.com/package/${{ inputs.package-name }}"
          } >> "$GITHUB_STEP_SUMMARY"
