name: Bump npm Version

on:
  workflow_call:
    inputs:
      package-name:
        required: true
        type: string
        description: "The npm package name (e.g. `@datum-cloud/datum-ui`)"
      package-path:
        required: true
        type: string
        description: "Path to the package directory relative to the repo root (e.g. `packages/datum-ui`)"
      bump-type:
        required: true
        type: string
        description: "Version bump type: `major`, `minor`, or `patch`"
      node-version:
        required: false
        type: number
        description: "Node.js version to use"
        default: 24
    outputs:
      new-version:
        description: "The new version after bumping (e.g. `v1.3.0`)"
        value: ${{ jobs.bump.outputs.new-version }}

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new-version: ${{ steps.resolve-version.outputs.new-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main

      # actions/checkout leaves HEAD detached. npm version creates its commit
      # on HEAD, so we need to be on the main branch ref for that commit to
      # advance main and get pushed.
      - name: Switch to main branch
        run: git checkout main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Resolve new version
        id: resolve-version
        working-directory: ${{ inputs.package-path }}
        env:
          BUMP_TYPE: ${{ inputs.bump-type }}
        run: |
          if [[ "$BUMP_TYPE" != "major" && "$BUMP_TYPE" != "minor" && "$BUMP_TYPE" != "patch" ]]; then
            echo "::error::Invalid bump-type '$BUMP_TYPE'. Must be one of: major, minor, patch"
            exit 1
          fi
          NEW_VERSION=$(node -e "
          const v = require('./package.json').version.split('.').map(Number);
          const t = process.env.BUMP_TYPE;
          if (t==='major'){v[0]++;v[1]=0;v[2]=0;}
          else if(t==='minor'){v[1]++;v[2]=0;}
          else{v[2]++;}
          console.log(v.join('.'));
          ")
          echo "new-version=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Bump version
        working-directory: ${{ inputs.package-path }}
        env:
          BUMP_TYPE: ${{ inputs.bump-type }}
          PACKAGE_NAME: ${{ inputs.package-name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version "$BUMP_TYPE" --message "chore: release ${PACKAGE_NAME} v%s [skip ci]"

      - name: Push
        run: |
          # Guard: refuse to push if npm version didn't actually advance main.
          # Prevents silently republishing the previous version downstream.
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse origin/main)
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "::error::npm version did not create a new commit on main; refusing to push a no-op."
            exit 1
          fi
          git push origin main
          git push origin --tags
