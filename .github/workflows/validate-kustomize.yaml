name: Validate Kustomize Configurations


on:
  # Allow the workflow to be re-used in other repos.
  workflow_call:
    inputs:
      load-restrictor:
        description: >-
          kustomize --load-restrictor value. Defaults to LoadRestrictionsNone
          to match Flux's kustomize-controller, so overlays that reference files
          outside their own directory validate the same way they deploy.
        type: string
        default: LoadRestrictionsNone
  push:
    paths:
      - ".github/workflows/*.yaml"

jobs:
  validate-kustomize:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Find and validate Kustomize configurations
      id: validate
      env:
        # Empty on push events (workflow_call inputs are unset there); fall back below.
        LOAD_RESTRICTOR: ${{ inputs.load-restrictor }}
      run: |
        LOAD_RESTRICTOR="${LOAD_RESTRICTOR:-LoadRestrictionsNone}"
        echo "# Kustomize Validation Results"
        echo ""
        {
          echo "# Kustomize Validation Results"
          echo ""
        } >> "${GITHUB_STEP_SUMMARY}"

        # Find all kustomization.yaml files
        KUSTOMIZATION_DIRS=$(find . -name "kustomization.yaml" -exec dirname {} \;)

        # Check if any kustomization files were found
        if [ -z "${KUSTOMIZATION_DIRS}" ]; then
          echo "ℹ️ No kustomization.yaml files found"
          echo "### ℹ️ No kustomization.yaml files found" >> "${GITHUB_STEP_SUMMARY}"
          exit 0
        fi

        # Initialize error flag
        HAS_ERRORS=0

        # Test each kustomization
        for dir in ${KUSTOMIZATION_DIRS}; do
          echo "🔍 Validating: ${dir}"
          if ! OUTPUT=$(kustomize build "${dir}" --enable-helm --load-restrictor "${LOAD_RESTRICTOR}" 2>&1); then
            echo ""
            echo "❌ Error in '${dir}':"
            echo "----------------------------------------"
            echo "$OUTPUT"
            echo "----------------------------------------"
            echo ""
            
            # Also add to GitHub step summary
            {
              echo "### ❌ Error in \`${dir}\`"
              echo "\`\`\`"
              echo "${OUTPUT}"
              echo "\`\`\`"
              echo ""
            } >> "${GITHUB_STEP_SUMMARY}"
            HAS_ERRORS=1
          else
            echo "✅ ${dir} is valid"
          fi
        done

        if [ "${HAS_ERRORS}" -eq 1 ]; then
          echo ""
          echo "🚨 One or more kustomizations failed validation."
          echo "::error::One or more Kustomize configurations failed validation"
          exit 1
        else
          echo ""
          echo "🎉 All kustomizations are valid."
          {
            echo "### 🎉 All kustomizations are valid!"
          } >> "${GITHUB_STEP_SUMMARY}"
        fi